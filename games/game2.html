<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orbit Weaver</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height:100%; margin:0; background:#060810; overflow:hidden; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #ui {
      position: fixed; left: 0; top: 0; right: 0; pointer-events: none;
      display:flex; justify-content:space-between; align-items:flex-start;
      padding: 14px 14px 0 14px; gap: 12px;
      color: rgba(255,255,255,.84);
      text-shadow: 0 2px 10px rgba(0,0,0,.55);
    }
    .pill {
      pointer-events:none;
      display:inline-flex; gap:10px; align-items:center;
      padding: 10px 12px; border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    .kbd {
      padding: 2px 8px; border-radius: 10px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-bottom-width: 2px;
    }
    canvas { display:block; }
    #centerMsg {
      position: fixed; inset: 0; display:grid; place-items:center;
      pointer-events:none;
    }
    .card {
      max-width: min(680px, 92vw);
      padding: 18px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
      color: rgba(255,255,255,.88);
      text-align:center;
    }
    .title { font-size: 34px; font-weight: 800; letter-spacing: .4px; margin: 0 0 8px 0; }
    .sub { opacity:.85; margin:0 0 12px 0; line-height:1.35; }
    .tiny { opacity:.72; margin:0; font-size: 13px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="ui">
    <div class="pill">
      Orbit Weaver
      <span style="opacity:.55">•</span>
      Lasso sparks by closing loops
    </div>
    <div class="pill">
      <span>Score: <b id="score">0</b></span>
      <span style="opacity:.55">•</span>
      <span>Best: <b id="best">0</b></span>
      <span style="opacity:.55">•</span>
      <span>HP: <b id="hp">3</b></span>
    </div>
  </div>

  <div id="centerMsg">
    <div class="card" id="startCard">
      <p class="title">Orbit Weaver</p>
      <p class="sub">
        You are a neon comet. Leave a ribbon trail and <b>close loops</b> to capture sparks inside.
        Avoid voids. Build combos.
      </p>
      <p class="sub">
        Controls:
        <span class="kbd">Mouse / Touch</span> or <span class="kbd">WASD</span>
        • Boost <span class="kbd">Shift</span>
        • Restart <span class="kbd">R</span>
      </p>
      <p class="tiny">Click / tap to begin.</p>
    </div>
  </div>

  <script>
  (() => {
    // ---------- Canvas setup ----------
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: false });

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const hpEl = document.getElementById("hp");
    const startCard = document.getElementById("startCard");
    const centerMsg = document.getElementById("centerMsg");

    const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    let W = 0, H = 0;

    function resize() {
      W = Math.floor(window.innerWidth);
      H = Math.floor(window.innerHeight);
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    window.addEventListener("resize", resize, { passive: true });
    resize();

    // Offscreen for bloom
    const scene = document.createElement("canvas");
    const sctx = scene.getContext("2d", { alpha: true });
    const bloom = document.createElement("canvas");
    const bctx = bloom.getContext("2d", { alpha: true });

    function resizeOffscreen() {
      scene.width = Math.floor(W * DPR);
      scene.height = Math.floor(H * DPR);
      bloom.width = Math.floor(W * DPR);
      bloom.height = Math.floor(H * DPR);
      sctx.setTransform(DPR,0,0,DPR,0,0);
      bctx.setTransform(DPR,0,0,DPR,0,0);
    }
    resizeOffscreen();
    window.addEventListener("resize", resizeOffscreen, { passive: true });

    // ---------- Utilities ----------
    const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
    const rand = (a,b)=>a + Math.random()*(b-a);
    const lerp = (a,b,t)=>a+(b-a)*t;
    const dist2 = (ax,ay,bx,by)=>{ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; };

    function hash(n){ // tiny deterministic hash for starfield
      n = (n<<13) ^ n;
      return (1.0 - ((n*(n*n*15731 + 789221)+1376312589) & 0x7fffffff) / 1073741824.0);
    }

    // Point-in-polygon (ray casting)
    function pointInPoly(px, py, poly){
      let inside = false;
      for (let i=0, j=poly.length-1; i<poly.length; j=i++){
        const xi = poly[i].x, yi = poly[i].y;
        const xj = poly[j].x, yj = poly[j].y;
        const intersect = ((yi>py)!=(yj>py)) && (px < (xj-xi)*(py-yi)/((yj-yi)||1e-9) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    // ---------- Input ----------
    let pointer = { x: W*0.5, y: H*0.5, down:false, has:false };
    window.addEventListener("pointerdown", e => { pointer.down=true; pointer.has=true; pointer.x=e.clientX; pointer.y=e.clientY; startGame(); }, { passive:true });
    window.addEventListener("pointermove", e => { pointer.has=true; pointer.x=e.clientX; pointer.y=e.clientY; }, { passive:true });
    window.addEventListener("pointerup", () => { pointer.down=false; }, { passive:true });

    const keys = new Set();
    window.addEventListener("keydown", e => {
      keys.add(e.key.toLowerCase());
      if (e.key.toLowerCase() === "r") reset();
    });
    window.addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));

    // ---------- Game state ----------
    const BEST_KEY = "orbit_weaver_best_v1";
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    bestEl.textContent = best;

    let started = false;

    const player = {
      x: W*0.5, y: H*0.55,
      vx: 0, vy: 0,
      r: 9,
      speed: 430,
      boost: 1.0,
      hue: 195,
      dmgTimer: 0
    };

    const trail = {
      pts: [],
      maxPts: 180,
      minStep: 4.5,
      age: 0
    };

    let sparks = [];
    let voids = [];
    let drones = [];
    let particles = [];

    let score = 0;
    let hp = 3;
    let combo = 0;
    let comboTimer = 0;

    function reset() {
      started = false;
      centerMsg.style.display = "grid";
      startCard.style.display = "block";

      score = 0; hp = 3; combo = 0; comboTimer = 0;
      scoreEl.textContent = "0";
      hpEl.textContent = String(hp);

      player.x = W*0.5; player.y = H*0.55;
      player.vx = 0; player.vy = 0;
      player.dmgTimer = 0;

      trail.pts.length = 0;
      particles.length = 0;
      sparks = [];
      voids = [];
      drones = [];

      // Spawn initial entities
      for (let i=0;i<14;i++) spawnSpark();
      for (let i=0;i<3;i++) spawnVoid();
      for (let i=0;i<5;i++) spawnDrone();
    }

    function startGame(){
      if (started) return;
      started = true;
      centerMsg.style.display = "none";
    }

    function spawnSpark() {
      const m = 80;
      sparks.push({
        x: rand(m, W-m),
        y: rand(m, H-m),
        r: rand(6, 10),
        hue: rand(40, 330),
        t: rand(0, 10),
        alive: true
      });
    }

    function spawnVoid() {
      const m = 140;
      voids.push({
        x: rand(m, W-m),
        y: rand(m, H-m),
        r: rand(32, 54),
        pull: rand(120, 190),
        t: rand(0, 10)
      });
    }

    function spawnDrone() {
      drones.push({
        x: rand(60, W-60),
        y: rand(60, H-60),
        r: rand(10, 16),
        vx: rand(-140,140),
        vy: rand(-140,140),
        hue: rand(0, 360),
        t: rand(0, 10)
      });
    }

    function burst(x,y,hue,amount=26,spd=260,life=0.9){
      for(let i=0;i<amount;i++){
        const a = rand(0, Math.PI*2);
        const v = rand(spd*0.35, spd);
        particles.push({
          x,y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
          r: rand(1.2, 3.6),
          life, max: life,
          hue: hue + rand(-18,18)
        });
      }
    }

    function ribbonSparkle(x,y,hue){
      particles.push({
        x,y, vx: rand(-30,30), vy: rand(-30,30),
        r: rand(0.9, 2.2),
        life: rand(0.25, 0.5), max: 0.5,
        hue: hue + rand(-8,8)
      });
    }

    // ---------- Loop capture logic ----------
    function tryCloseLoop() {
      const pts = trail.pts;
      if (pts.length < 26) return;

      // If current position is close to some earlier point, consider a loop
      const head = pts[pts.length - 1];
      const closeDist = 18*18;
      let hitIndex = -1;

      // Search in older points (skip the last few points so we don't close instantly)
      for (let i = 0; i < pts.length - 12; i++) {
        if (dist2(head.x, head.y, pts[i].x, pts[i].y) < closeDist) {
          hitIndex = i;
          break;
        }
      }
      if (hitIndex < 0) return;

      // Build polygon from hitIndex..end
      const poly = pts.slice(hitIndex);
      if (poly.length < 18) return;

      // Count sparks inside
      let captured = 0;
      for (const s of sparks) {
        if (!s.alive) continue;
        if (pointInPoly(s.x, s.y, poly)) {
          s.alive = false;
          captured++;
          burst(s.x, s.y, s.hue, 20, 260, 0.7);
        }
      }

      if (captured > 0) {
        // Combo scoring
        comboTimer = 2.2;
        combo++;
        const base = captured * 100;
        const bonus = Math.floor(base * (0.25 * clamp(combo-1,0,8)));
        score += base + bonus;

        scoreEl.textContent = String(score);

        // Big celebratory burst at loop center
        let cx=0, cy=0;
        for (const p of poly){ cx+=p.x; cy+=p.y; }
        cx/=poly.length; cy/=poly.length;
        burst(cx, cy, player.hue, 140, 520, 1.15);

        // Clear trail to encourage re-weaving
        trail.pts.length = 0;
      } else {
        // If loop closes with nothing inside, just soften the trail (still looks cool)
        burst(head.x, head.y, player.hue, 24, 220, 0.5);
        trail.pts.splice(0, Math.floor(trail.pts.length * 0.35));
      }

      // Respawn dead sparks
      const aliveCount = sparks.filter(s => s.alive).length;
      while (aliveCount + sparks.filter(s => s.alive).length < 14) break; // (kept safe)
      for (let i=0;i<captured;i++) spawnSpark();
    }

    // ---------- Update ----------
    let last = performance.now();

    function update(dt){
      if (!started) return;

      // Inputs: mouse/touch "magnet" + keyboard
      const boost = (keys.has("shift")) ? 1.35 : 1.0;
      player.boost = boost;

      let ax = 0, ay = 0;
      const up = keys.has("w") || keys.has("arrowup");
      const down = keys.has("s") || keys.has("arrowdown");
      const left = keys.has("a") || keys.has("arrowleft");
      const right = keys.has("d") || keys.has("arrowright");
      if (up) ay -= 1;
      if (down) ay += 1;
      if (left) ax -= 1;
      if (right) ax += 1;
      if (ax || ay){
        const l = Math.hypot(ax,ay) || 1;
        ax/=l; ay/=l;
      }

      // Pointer pull (gentle) for satisfying motion
      if (pointer.has){
        const dx = pointer.x - player.x;
        const dy = pointer.y - player.y;
        const d = Math.hypot(dx,dy) || 1;
        const pull = clamp(d/180, 0, 1);
        ax += (dx/d) * 0.9 * pull;
        ay += (dy/d) * 0.9 * pull;
      }

      // Smooth acceleration
      const targetVx = ax * player.speed * player.boost;
      const targetVy = ay * player.speed * player.boost;
      player.vx = lerp(player.vx, targetVx, 1 - Math.pow(0.0004, dt));
      player.vy = lerp(player.vy, targetVy, 1 - Math.pow(0.0004, dt));

      // Void pull + danger
      for (const v of voids){
        const dx = v.x - player.x, dy = v.y - player.y;
        const d = Math.hypot(dx,dy) || 1;
        const pull = v.pull / (d*d*0.006 + 1);
        player.vx += (dx/d) * pull * dt;
        player.vy += (dy/d) * pull * dt;

        // Damage if inside the core
        if (d < v.r + player.r && player.dmgTimer <= 0){
          hp--;
          hpEl.textContent = String(hp);
          player.dmgTimer = 1.0;
          burst(player.x, player.y, 0, 110, 520, 1.0);
          combo = 0; comboTimer = 0;

          if (hp <= 0){
            // End
            started = false;
            centerMsg.style.display = "grid";
            startCard.style.display = "block";
            startCard.querySelector(".title").textContent = "Lost in the Void";
            startCard.querySelector(".sub").innerHTML =
              `Final score: <b>${score}</b> • Best: <b>${best}</b><br>Click / tap to try again.`;
            if (score > best){
              best = score;
              localStorage.setItem(BEST_KEY, String(best));
              bestEl.textContent = String(best);
            }
          }
        }
      }

      // Integrate
      player.x += player.vx * dt;
      player.y += player.vy * dt;

      // Soft bounds (wrap-ish)
      const pad = 10;
      if (player.x < -pad) player.x = W + pad;
      if (player.x > W + pad) player.x = -pad;
      if (player.y < -pad) player.y = H + pad;
      if (player.y > H + pad) player.y = -pad;

      // Trail
      const pts = trail.pts;
      trail.age += dt;

      // Add points with spacing
      if (pts.length === 0){
        pts.push({x:player.x, y:player.y});
      } else {
        const lastP = pts[pts.length - 1];
        const d = Math.hypot(player.x - lastP.x, player.y - lastP.y);
        if (d >= trail.minStep){
          // Insert multiple points if fast
          const steps = Math.min(6, Math.floor(d / trail.minStep));
          for (let i=1;i<=steps;i++){
            const t = i/(steps+1);
            pts.push({ x: lerp(lastP.x, player.x, t), y: lerp(lastP.y, player.y, t) });
          }
          pts.push({x:player.x, y:player.y});
        }
      }
      while (pts.length > trail.maxPts) pts.shift();

      // Pretty sparkles along ribbon
      if (pts.length > 1){
        const p = pts[pts.length-1];
        ribbonSparkle(p.x + rand(-2,2), p.y + rand(-2,2), player.hue);
      }

      // Close-loop check
      tryCloseLoop();

      // Combo decay
      if (comboTimer > 0) comboTimer -= dt;
      else combo = 0;

      // Sparks animate + attract slightly to motion (feel alive)
      for (const s of sparks){
        s.t += dt;
        if (!s.alive) continue;

        const wob = 10;
        s.x += Math.cos(s.t*1.3 + s.hue) * dt * wob;
        s.y += Math.sin(s.t*1.1 + s.hue) * dt * wob;

        // Respawn if out of bounds
        s.x = (s.x + W) % W;
        s.y = (s.y + H) % H;

        // If player touches spark directly -> small score
        if (dist2(player.x, player.y, s.x, s.y) < (player.r + s.r + 7) ** 2){
          s.alive = false;
          score += 35;
          scoreEl.textContent = String(score);
          burst(s.x, s.y, s.hue, 20, 300, 0.6);
          spawnSpark();
        }
      }

      // Drones
      for (const d of drones){
        d.t += dt;
        d.x += d.vx * dt;
        d.y += d.vy * dt;

        // Bounce edges
        if (d.x < d.r || d.x > W - d.r) d.vx *= -1;
        if (d.y < d.r || d.y > H - d.r) d.vy *= -1;

        // Minor steering
        d.vx += Math.cos(d.t*0.9)*dt*18;
        d.vy += Math.sin(d.t*1.1)*dt*18;

        // Hit player
        if (player.dmgTimer <= 0 && dist2(player.x, player.y, d.x, d.y) < (player.r + d.r + 3) ** 2){
          hp--;
          hpEl.textContent = String(hp);
          player.dmgTimer = 0.9;
          burst(player.x, player.y, d.hue, 90, 520, 0.95);
          combo = 0; comboTimer = 0;

          if (hp <= 0){
            started = false;
            centerMsg.style.display = "grid";
            startCard.style.display = "block";
            startCard.querySelector(".title").textContent = "Signal Lost";
            startCard.querySelector(".sub").innerHTML =
              `Final score: <b>${score}</b> • Best: <b>${best}</b><br>Click / tap to try again.`;
            if (score > best){
              best = score;
              localStorage.setItem(BEST_KEY, String(best));
              bestEl.textContent = String(best);
            }
          }
        }
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--){
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i,1); continue; }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(0.18, dt); // strong damping
        p.vy *= Math.pow(0.18, dt);
      }

      // Damage timer
      if (player.dmgTimer > 0) player.dmgTimer -= dt;

      // Slowly shift player hue for dynamic look
      player.hue = (player.hue + dt * 18) % 360;
    }

    // ---------- Render ----------
    function drawStarfield(g){
      // Deep gradient space
      const grd = g.createLinearGradient(0,0,0,H);
      grd.addColorStop(0, "#060813");
      grd.addColorStop(0.55, "#071027");
      grd.addColorStop(1, "#04040a");
      g.fillStyle = grd;
      g.fillRect(0,0,W,H);

      // Procedural stars
      g.save();
      g.globalAlpha = 0.55;
      for (let i=0;i<420;i++){
        const hx = hash(i*17.1)*0.5+0.5;
        const hy = hash(i*31.7)*0.5+0.5;
        const x = hx * W;
        const y = hy * H;
        const r = 0.6 + (hash(i*91.3)*0.5+0.5)*1.6;

        g.fillStyle = "rgba(255,255,255," + (0.12 + r*0.08) + ")";
        g.beginPath();
        g.arc(x,y,r,0,Math.PI*2);
        g.fill();

        // occasional colored star
        if (i % 18 === 0){
          g.fillStyle = `hsla(${(i*9)%360}, 90%, 70%, 0.12)`;
          g.beginPath();
          g.arc(x,y,r*2.2,0,Math.PI*2);
          g.fill();
        }
      }
      g.restore();
    }

    function drawVoids(g){
      for (const v of voids){
        v.t += 0.016;

        // Outer glow
        g.save();
        g.globalCompositeOperation = "lighter";
        const ring = g.createRadialGradient(v.x,v.y, 0, v.x,v.y, v.r*3.2);
        ring.addColorStop(0, "rgba(0,0,0,0)");
        ring.addColorStop(0.2, "rgba(130,60,255,0.05)");
        ring.addColorStop(0.5, "rgba(40,10,80,0.18)");
        ring.addColorStop(1, "rgba(0,0,0,0)");
        g.fillStyle = ring;
        g.beginPath();
        g.arc(v.x,v.y,v.r*3.2,0,Math.PI*2);
        g.fill();
        g.restore();

        // Core
        g.save();
        const core = g.createRadialGradient(v.x,v.y, 0, v.x,v.y, v.r);
        core.addColorStop(0, "rgba(0,0,0,1)");
        core.addColorStop(0.45, "rgba(0,0,0,1)");
        core.addColorStop(0.7, "rgba(30,12,70,0.8)");
        core.addColorStop(1, "rgba(150,90,255,0.08)");
        g.fillStyle = core;
        g.beginPath();
        g.arc(v.x,v.y,v.r,0,Math.PI*2);
        g.fill();

        // Subtle swirl lines
        g.globalAlpha = 0.22;
        g.strokeStyle = "rgba(180,120,255,0.35)";
        g.lineWidth = 1;
        for (let k=0;k<9;k++){
          const a0 = v.t*0.7 + k*(Math.PI*2/9);
          g.beginPath();
          for (let t=0;t<=1;t+=0.08){
            const rr = lerp(v.r*0.2, v.r*1.0, t);
            const aa = a0 + t*2.8;
            const x = v.x + Math.cos(aa)*rr;
            const y = v.y + Math.sin(aa)*rr;
            if (t === 0) g.moveTo(x,y); else g.lineTo(x,y);
          }
          g.stroke();
        }
        g.restore();
      }
    }

    function drawSparks(g){
      g.save();
      g.globalCompositeOperation = "lighter";
      for (const s of sparks){
        if (!s.alive) continue;
        const pulse = 0.6 + Math.sin(s.t*3.2)*0.15;
        const rr = s.r * pulse;

        const grad = g.createRadialGradient(s.x,s.y, 0, s.x,s.y, rr*6);
        grad.addColorStop(0, `hsla(${s.hue}, 95%, 75%, 0.95)`);
        grad.addColorStop(0.15, `hsla(${s.hue}, 95%, 65%, 0.35)`);
        grad.addColorStop(1, `hsla(${(s.hue+40)%360}, 95%, 65%, 0)`);
        g.fillStyle = grad;
        g.beginPath();
        g.arc(s.x,s.y,rr*6,0,Math.PI*2);
        g.fill();

        // Tiny bright core
        g.fillStyle = "rgba(255,255,255,0.85)";
        g.beginPath();
        g.arc(s.x,s.y,rr*0.85,0,Math.PI*2);
        g.fill();
      }
      g.restore();
    }

    function drawDrones(g){
      g.save();
      g.globalCompositeOperation = "lighter";
      for (const d of drones){
        const glow = g.createRadialGradient(d.x,d.y, 0, d.x,d.y, d.r*5);
        glow.addColorStop(0, `hsla(${d.hue}, 95%, 65%, 0.55)`);
        glow.addColorStop(0.2, `hsla(${(d.hue+40)%360}, 95%, 60%, 0.18)`);
        glow.addColorStop(1, "rgba(0,0,0,0)");
        g.fillStyle = glow;
        g.beginPath();
        g.arc(d.x,d.y,d.r*5,0,Math.PI*2);
        g.fill();

        g.fillStyle = `hsla(${d.hue}, 95%, 62%, 0.9)`;
        g.beginPath();
        g.arc(d.x,d.y,d.r,0,Math.PI*2);
        g.fill();

        // inner highlight
        g.fillStyle = "rgba(255,255,255,0.35)";
        g.beginPath();
        g.arc(d.x - d.r*0.25, d.y - d.r*0.25, d.r*0.35, 0, Math.PI*2);
        g.fill();
      }
      g.restore();
    }

    function drawTrail(g){
      const pts = trail.pts;
      if (pts.length < 2) return;

      g.save();
      g.lineJoin = "round";
      g.lineCap = "round";
      g.globalCompositeOperation = "lighter";

      // Glow layers (thick -> thin)
      for (let layer = 0; layer < 3; layer++){
        const w = [16, 9, 4][layer];
        const a = [0.18, 0.28, 0.55][layer];
        g.lineWidth = w;

        const hue = (player.hue + layer*18) % 360;
        g.strokeStyle = `hsla(${hue}, 95%, 68%, ${a})`;

        g.beginPath();
        g.moveTo(pts[0].x, pts[0].y);
        for (let i=1;i<pts.length-1;i++){
          const p0 = pts[i];
          const p1 = pts[i+1];
          const mx = (p0.x + p1.x)/2;
          const my = (p0.y + p1.y)/2;
          g.quadraticCurveTo(p0.x, p0.y, mx, my);
        }
        g.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
        g.stroke();
      }

      g.restore();
    }

    function drawPlayer(g){
      g.save();
      g.globalCompositeOperation = "lighter";
      const hue = player.hue;

      // Comet glow
      const grad = g.createRadialGradient(player.x,player.y, 0, player.x,player.y, 80);
      grad.addColorStop(0, `hsla(${hue}, 95%, 75%, ${player.dmgTimer>0?0.35:0.55})`);
      grad.addColorStop(0.18, `hsla(${(hue+35)%360}, 95%, 65%, 0.16)`);
      grad.addColorStop(1, "rgba(0,0,0,0)");
      g.fillStyle = grad;
      g.beginPath();
      g.arc(player.x,player.y,80,0,Math.PI*2);
      g.fill();

      // Core
      const blink = player.dmgTimer>0 && (Math.floor(performance.now()/90)%2===0);
      g.fillStyle = blink ? "rgba(255,255,255,0.35)" : `hsla(${hue}, 95%, 68%, 0.92)`;
      g.beginPath();
      g.arc(player.x,player.y, player.r, 0, Math.PI*2);
      g.fill();

      // Specular
      g.fillStyle = "rgba(255,255,255,0.35)";
      g.beginPath();
      g.arc(player.x - player.r*0.25, player.y - player.r*0.25, player.r*0.35, 0, Math.PI*2);
      g.fill();

      g.restore();
    }

    function drawParticles(g){
      if (!particles.length) return;
      g.save();
      g.globalCompositeOperation = "lighter";
      for (const p of particles){
        const t = p.life / p.max;
        const alpha = clamp(t,0,1);
        g.fillStyle = `hsla(${p.hue}, 95%, 70%, ${0.75*alpha})`;
        g.beginPath();
        g.arc(p.x,p.y, p.r*(0.6 + (1-alpha)*0.6), 0, Math.PI*2);
        g.fill();
      }
      g.restore();
    }

    function render(){
      // Scene render (to offscreen)
      sctx.clearRect(0,0,W,H);
      drawStarfield(sctx);

      // Slight vignette
      sctx.save();
      const vig = sctx.createRadialGradient(W*0.5,H*0.55, Math.min(W,H)*0.2, W*0.5,H*0.55, Math.max(W,H)*0.75);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(1, "rgba(0,0,0,0.55)");
      sctx.fillStyle = vig;
      sctx.fillRect(0,0,W,H);
      sctx.restore();

      drawVoids(sctx);
      drawSparks(sctx);
      drawDrones(sctx);
      drawTrail(sctx);
      drawParticles(sctx);
      drawPlayer(sctx);

      // Bloom pass (blurred scene additively)
      bctx.clearRect(0,0,W,H);
      bctx.save();
      bctx.globalCompositeOperation = "source-over";
      bctx.filter = "blur(14px)";
      bctx.globalAlpha = 0.85;
      bctx.drawImage(scene, 0, 0, W, H);
      bctx.restore();

      // Composite to screen
      ctx.clearRect(0,0,W,H);

      // Base
      ctx.drawImage(scene, 0, 0, W, H);

      // Bloom add
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = 0.95;
      ctx.drawImage(bloom, 0, 0, W, H);
      ctx.restore();

      // Crisp top highlights (second small blur)
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.globalAlpha = 0.55;
      ctx.filter = "blur(4px)";
      ctx.drawImage(scene, 0, 0, W, H);
      ctx.filter = "none";
      ctx.restore();

      // Small HUD hint for combo (subtle)
      if (started && combo > 1 && comboTimer > 0){
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.font = "700 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.textAlign = "left";
        ctx.fillText(`Combo x${combo}`, 18, 74);
        ctx.restore();
      }
    }

    // ---------- Main loop ----------
    function loop(now){
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    // init
    reset();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
